name = "randall-construction"
compatibility_date = "2024-09-23"
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[env.production]
routes = [
  { pattern = "randallexcavation.com", zone_name = "randallexcavation.com" },
  { pattern = "*.randallexcavation.com", zone_name = "randallexcavation.com" }
]
