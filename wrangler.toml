name = "randall-construction"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"

routes = [
  { pattern = "randallexcavation.com", zone_name = "randallexcavation.com", custom_domain = true },
  { pattern = "www.randallexcavation.com", zone_name = "randallexcavation.com", custom_domain = true }
]

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"
